project:
  name: "sl_axisymmetric_test"
  run_id: "iter0_axisymmetric"

geometry:
  formulation: "axisymmetric"

  vessel:
    type: "cylinder"
    radius_m: 0.05
    height_m: 0.10

  reflector:
    enabled: true
    type: "parabolic"
    focal_length_m: 0.015
    vertex_z_m: 0.010
    aperture_radius_m: 0.020

  source_patch:
    type: "top_disk"
    r_min_m: 0.005
    r_max_m: 0.015
    z_m: 0.100

  bubble_position:
    r_m: 0.025
    z_m: 0.050

mesh:
  h_bulk_m: 0.008
  h_source_m: 0.008
  h_reflector_m: 0.008
  h_bubble_zone_m: 0.00015

liquid:
  density_kg_m3: 998.0
  sound_speed_m_s: 1480.0
  viscosity_pa_s: 0.001
  surface_tension_n_m: 0.072
  static_pressure_pa: 101325.0
  temperature_k: 293.15

acoustics:
  formulation: "axisymmetric_helmholtz"
  frequency_hz: 25000.0
  time_convention: "exp_minus_iwt"

  source:
    boundary_tag: 3
    normal_velocity_m_s: 0.01
    mode: "uniform"

  rigid_boundaries:
    - 1
    - 2

  output:
    sample_bubble_point: true
    compute_focus_region: true